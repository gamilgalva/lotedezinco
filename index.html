<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamil | Zinco v4.8 Master Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9; 
        }

        .tab-active { 
            border-bottom: 4px solid #3b82f6; 
            color: #1e40af; 
            font-weight: 800; 
        }

        .card-active { 
            border-left: 6px solid #3b82f6; 
            background-color: #f0f9ff; 
        }

        .edit-mode { 
            border: 2px solid #10b981 !important; 
            background-color: #f0fdf4 !important; 
        }

        #login-overlay { 
            background: rgba(15, 23, 42, 0.98); 
        }

        .error-shake { 
            animation: shake 0.4s; 
            border: 2px solid #ef4444 !important; 
        }

        @keyframes shake { 
            0%, 100% { transform: translateX(0); } 
            25% { transform: translateX(-8px); } 
            75% { transform: translateX(8px); } 
        }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div id="login-overlay" class="fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center">
            <img src="logo.png" alt="Gamil Logo" class="h-20 mx-auto mb-6 object-contain">
            <h2 class="text-xl font-black text-slate-800 uppercase mb-2 tracking-tighter">Sistema Gamil</h2>
            <p class="text-slate-400 text-[10px] font-bold mb-8 tracking-widest uppercase">Controle de Logística de Zinco</p>
            
            <div class="space-y-4">
                <select id="user-select" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold outline-none focus:border-blue-500 transition-all text-slate-700">
                    <option value="">SELECIONE O UTILIZADOR</option>
                    <optgroup label="ADMINISTRAÇÃO">
                        <option value="Hamilton Junior">Hamilton Junior</option>
                        <option value="José Pedro">José Pedro</option>
                        <option value="Carlos Meira">Carlos Meira</option>
                    </optgroup>
                    <optgroup label="OPERACIONAL">
                        <option value="Produção">Equipa de Produção</option>
                    </optgroup>
                </select>
                
                <input type="password" id="user-pass" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold outline-none focus:border-blue-500 transition-all" placeholder="SENHA">
                
                <button onclick="realizarLogin()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl uppercase hover:bg-blue-700 shadow-xl transition-all">Entrar</button>
            </div>
        </div>
    </div>

    <header class="bg-slate-900 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="logo.png" alt="Logo" class="h-10 object-contain bg-white rounded p-1">
                <div>
                    <h1 class="text-xl font-black text-blue-400 uppercase tracking-tighter leading-none">Gamil <span class="text-white">Logistics</span></h1>
                    <span id="logged-user-display" class="text-[9px] font-bold text-emerald-400 uppercase tracking-widest italic">Sessão</span>
                </div>
            </div>
            <div class="flex gap-2">
                <div class="bg-slate-800 px-3 py-1 rounded-xl border border-slate-700 text-center">
                    <span class="block text-[7px] uppercase font-black text-slate-400">Lotes</span>
                    <span id="display-lotes-total" class="text-sm font-black text-blue-400">0</span>
                </div>
                <div class="bg-slate-800 px-3 py-1 rounded-xl border border-slate-700 text-center">
                    <span class="block text-[7px] uppercase font-black text-slate-400">Stock</span>
                    <span id="display-ton" class="text-sm font-black text-emerald-400">0.000 t</span>
                </div>
                <button onclick="location.reload()" class="bg-slate-700 p-2 rounded-xl text-[9px] font-black uppercase">Sair</button>
            </div>
        </div>
    </header>

    <nav id="main-nav" class="bg-white border-b sticky top-[68px] z-40 shadow-sm overflow-x-auto whitespace-nowrap">
        <div class="container mx-auto flex" id="nav-container">
            <button onclick="switchTab('cargas')" id="tab-cargas" class="px-6 py-4 text-xs font-bold uppercase tracking-widest tab-active">1. Cargas</button>
            <button onclick="switchTab('entrada')" id="tab-entrada" class="px-6 py-4 text-xs font-bold uppercase tracking-widest text-slate-400">2. Lotes</button>
            <button onclick="switchTab('picagem')" id="tab-picagem" class="px-6 py-4 text-xs font-bold uppercase tracking-widest text-slate-400 text-rose-500">3. Picagem</button>
            <button onclick="switchTab('status')" id="tab-status" class="px-6 py-4 text-xs font-bold uppercase tracking-widest text-slate-400 text-blue-600 font-black">4. Histórico</button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6 max-w-4xl" id="main-content">

        <section id="sec-cargas" class="space-y-4">
            <div id="form-carga" class="bg-white p-6 rounded-2xl shadow-md border border-slate-200 transition-all">
                <h3 class="text-xs font-black mb-4 uppercase text-slate-500 italic text-center tracking-widest">Identificação da Carga</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                    <input type="text" id="c-fornecedor" class="p-3 bg-slate-50 border rounded-xl font-bold uppercase outline-none focus:ring-2 ring-blue-500" placeholder="FORNECEDOR">
                    <input type="text" id="c-caminhao" class="p-3 bg-slate-50 border rounded-xl font-bold uppercase outline-none focus:ring-2 ring-blue-500" placeholder="PLACA">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
                    <input type="text" id="c-guia" class="p-3 bg-slate-50 border rounded-xl font-bold uppercase outline-none focus:ring-2 ring-blue-500" placeholder="GUIA FORN.">
                    <input type="number" step="0.001" id="c-toneladas" class="p-3 bg-slate-50 border rounded-xl font-bold outline-none focus:ring-2 ring-blue-500" placeholder="TONELADAS">
                    <input type="date" id="c-data-chegada" class="p-3 bg-blue-50 border rounded-xl font-bold text-xs outline-none">
                </div>
                <div class="flex gap-2">
                    <button id="btn-salvar-carga" onclick="salvarCarga()" class="flex-1 bg-blue-600 text-white font-black py-4 rounded-xl uppercase hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">Abrir Recebimento</button>
                    <button id="btn-update-carga" onclick="confirmarEdicaoCarga()" class="hidden flex-1 bg-emerald-600 text-white font-black py-4 rounded-xl uppercase">Atualizar Dados</button>
                    <button id="btn-cancel-carga" onclick="cancelarEdicaoCarga()" class="hidden flex-1 bg-slate-400 text-white font-black py-4 rounded-xl uppercase">Cancelar</button>
                </div>
            </div>
            <div id="lista-cargas-abertas" class="space-y-3"></div>
        </section>

        <section id="sec-entrada" class="hidden space-y-4">
            <div id="card-lotes" class="bg-white p-6 rounded-2xl shadow-md border border-slate-200">
                <select id="select-carga-ativa" class="w-full p-3 bg-blue-50 border-2 border-blue-200 rounded-xl font-bold mb-4 outline-none focus:border-blue-500 transition-all"></select>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
                    <input type="text" id="in-lote" class="p-3 bg-slate-50 border rounded-xl font-bold uppercase outline-none focus:ring-2 ring-blue-500" placeholder="ID LOTE">
                    <input type="number" id="in-peso" class="p-3 bg-slate-50 border rounded-xl font-bold outline-none focus:ring-2 ring-blue-500" placeholder="PESO (KG)">
                    <input type="text" id="in-guia-gamil" class="p-3 bg-emerald-50 border border-emerald-200 rounded-xl font-bold uppercase outline-none focus:ring-2 ring-emerald-500" placeholder="GUIA GAMIL">
                </div>
                <div class="flex gap-2">
                    <button id="btn-salvar-lote" onclick="salvarLote()" class="flex-1 bg-blue-600 text-white font-black py-4 rounded-xl uppercase hover:bg-blue-700 shadow-xl transition-all">Registar Lote</button>
                    <button id="btn-update-lote" onclick="confirmarEdicaoLote()" class="hidden flex-1 bg-emerald-600 text-white font-black py-4 rounded-xl uppercase">Atualizar Lote</button>
                    <button id="btn-cancel-lote" onclick="cancelarEdicaoLote()" class="hidden flex-1 bg-slate-400 text-white font-black py-4 rounded-xl uppercase">Sair</button>
                </div>
            </div>
            <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-200">
                <table class="w-full text-left text-xs font-mono">
                    <thead class="bg-slate-50 border-b">
                        <tr>
                            <th class="p-3 uppercase text-slate-400">Lote</th>
                            <th class="p-3 uppercase text-slate-400">Data Carga</th>
                            <th class="p-3 uppercase text-slate-400">Guia</th>
                            <th class="p-3 text-center uppercase text-slate-400">Peso</th>
                            <th class="p-3 text-center uppercase text-slate-400">Acções</th>
                        </tr>
                    </thead>
                    <tbody id="lista-lotes-entrada" class="divide-y divide-slate-100 italic"></tbody>
                </table>
            </div>
        </section>

        <section id="sec-picagem" class="hidden space-y-4">
            <div class="bg-slate-900 p-6 rounded-2xl shadow-xl border-b-4 border-blue-500 text-center">
                <input type="text" id="pda-scan" class="w-full p-4 text-3xl text-center font-black bg-white rounded-xl uppercase text-slate-900 focus:ring-4 ring-blue-500 outline-none" placeholder="SCANNER PDA">
                <div id="pda-feedback" class="hidden mt-4 p-4 rounded-xl text-center font-bold text-lg"></div>
            </div>
            <div id="lista-picagem" class="space-y-3"></div>
        </section>

        <section id="sec-status" class="hidden space-y-4 text-center">
            <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-200">
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="date" id="filtro-inicio" class="p-3 border rounded-xl bg-slate-50 font-bold outline-none">
                    <input type="date" id="filtro-fim" class="p-3 border rounded-xl bg-slate-50 font-bold outline-none">
                </div>
                <button onclick="gerarPDF()" class="w-full bg-slate-800 text-white font-black py-4 rounded-xl uppercase hover:bg-black transition-all">📄 Exportar Relatório PDF</button>
            </div>
            <div id="resumo-diario" class="space-y-4 text-left"></div>
        </section>

    </main>

    <script>
        const SENHA_MESTRA = "gamil2026";
        let ID_CARGA_EDIT = null;
        let ID_LOTE_EDIT = null;

        document.getElementById('c-data-chegada').valueAsDate = new Date();

        const firebaseConfig = {
            apiKey: "AIzaSyBfd_E9LHXpng0nAtG4-A9GrjGHCo049oM",
            authDomain: "lotezinco.firebaseapp.com",
            projectId: "lotezinco",
            storageBucket: "lotezinco.firebasestorage.app",
            messagingSenderId: "797490873231",
            appId: "1:797490873231:web:a0bd5cef82b5389ad01fa"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const cargasRef = db.collection("cargas_zinco");
        const lotesRef = db.collection("movimentacao_zinco");

        let cargasLocais = [];
        let todosOsLotes = [];

        // LÓGICA DE ACESSO BLOQUEADA (CORREÇÃO v4.8)
        function realizarLogin() {
            const user = document.getElementById('user-select').value;
            const pass = document.getElementById('user-pass').value;

            if(!user || pass !== SENHA_MESTRA) return alert("Acesso Negado!");

            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('logged-user-display').innerText = `${user}`;

            if(user === "Produção") {
                // Remove os botões do menu permanentemente para esta sessão
                document.getElementById('tab-cargas').remove();
                document.getElementById('tab-entrada').remove();
                document.getElementById('tab-status').remove();
                
                // Remove as seções de código para evitar inspeção e acesso indevido
                document.getElementById('sec-cargas').remove();
                document.getElementById('sec-entrada').remove();
                document.getElementById('sec-status').remove();

                switchTab('picagem');
            } else {
                switchTab('cargas');
            }
        }

        function switchTab(tab) {
            const abasPermitidas = ['cargas', 'entrada', 'picagem', 'status'];
            abasPermitidas.forEach(t => {
                const elSec = document.getElementById(`sec-${t}`);
                const elTab = document.getElementById(`tab-${t}`);
                if(elSec) elSec.classList.add('hidden');
                if(elTab) elTab.className = 'px-6 py-4 text-xs font-bold uppercase tracking-widest text-slate-400';
            });

            const targetSec = document.getElementById(`sec-${tab}`);
            const targetTab = document.getElementById(`tab-${tab}`);
            
            if(targetSec) targetSec.classList.remove('hidden');
            if(targetTab) targetTab.className = 'px-6 py-4 text-xs font-bold uppercase tracking-widest tab-active';

            if(tab === 'picagem') setTimeout(() => {
                const scanInput = document.getElementById('pda-scan');
                if(scanInput) scanInput.focus();
            }, 200);
            
            if(tab === 'status') renderizarHistorico();
        }

        // --- GESTÃO DE CARGAS ---
        async function salvarCarga() {
            const forn = document.getElementById('c-fornecedor').value.trim().toUpperCase();
            const cam = document.getElementById('c-caminhao').value.trim().toUpperCase();
            const guia = document.getElementById('c-guia').value.trim().toUpperCase();
            const tons = document.getElementById('c-toneladas').value || 0;
            const data = document.getElementById('c-data-chegada').value;
            if(!forn || !cam || !guia) return alert("Faltam dados da carga!");
            const cid = `CARGA-${Date.now()}`;
            await cargasRef.doc(cid).set({ id: cid, fornecedor: forn, caminhao: cam, guia: guia, toneladas_declaradas: parseFloat(tons), status: 'aberta', ts: Date.now(), data_chegada: data });
            limparFormCarga();
        }

        function editarCarga(id) {
            if(prompt("Senha:") !== SENHA_MESTRA) return alert("Erro!");
            const c = cargasLocais.find(x => x.id === id);
            ID_CARGA_EDIT = id;
            document.getElementById('c-fornecedor').value = c.fornecedor;
            document.getElementById('c-caminhao').value = c.caminhao;
            document.getElementById('c-guia').value = c.guia;
            document.getElementById('c-toneladas').value = c.toneladas_declaradas;
            document.getElementById('c-data-chegada').value = c.data_chegada;
            document.getElementById('btn-salvar-carga').classList.add('hidden');
            document.getElementById('btn-update-carga').classList.remove('hidden');
            document.getElementById('btn-cancel-carga').classList.remove('hidden');
            document.getElementById('form-carga').classList.add('edit-mode');
            window.scrollTo(0,0);
        }

        async function confirmarEdicaoCarga() {
            await cargasRef.doc(ID_CARGA_EDIT).update({
                fornecedor: document.getElementById('c-fornecedor').value.toUpperCase(),
                caminhao: document.getElementById('c-caminhao').value.toUpperCase(),
                guia: document.getElementById('c-guia').value.toUpperCase(),
                toneladas_declaradas: parseFloat(document.getElementById('c-toneladas').value || 0),
                data_chegada: document.getElementById('c-data-chegada').value
            });
            cancelarEdicaoCarga();
        }

        function cancelarEdicaoCarga() { ID_CARGA_EDIT = null; limparFormCarga(); document.getElementById('btn-salvar-carga').classList.remove('hidden'); document.getElementById('btn-update-carga').classList.add('hidden'); document.getElementById('btn-cancel-carga').classList.add('hidden'); document.getElementById('form-carga').classList.remove('edit-mode'); }

        function limparFormCarga() { document.getElementById('c-fornecedor').value = ""; document.getElementById('c-caminhao').value = ""; document.getElementById('c-guia').value = ""; document.getElementById('c-toneladas').value = ""; document.getElementById('c-data-chegada').valueAsDate = new Date(); }

        cargasRef.orderBy('ts', 'desc').onSnapshot(snap => {
            cargasLocais = [];
            const list = document.getElementById('lista-cargas-abertas');
            const sel = document.getElementById('select-carga-ativa');
            if(!list || !sel) return;
            list.innerHTML = ""; sel.innerHTML = '<option value="">-- SELECIONE O CAMINHÃO --</option>';
            snap.forEach(doc => {
                const c = doc.data();
                if(c.status === 'aberta') {
                    cargasLocais.push(c);
                    sel.innerHTML += `<option value="${c.id}">${c.fornecedor} | GUIA: ${c.guia}</option>`;
                    list.innerHTML += `
                        <div class="p-4 bg-white rounded-xl shadow-sm border border-slate-200 card-active flex justify-between items-center transition-all">
                            <div>
                                <span class="block text-blue-600 font-black text-xs uppercase">${c.fornecedor}</span>
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Caminhão: ${c.caminhao} | Chegada: ${new Date(c.data_chegada).toLocaleDateString()}</span>
                                <span class="block text-[10px] font-black text-emerald-600 uppercase">Declarado: ${c.toneladas_declaradas.toFixed(3)}t</span>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="editarCarga('${c.id}')" class="text-blue-500 font-bold text-[9px] uppercase px-2 py-1 bg-slate-50 rounded">Edit</button>
                                <button onclick="apagarCarga('${c.id}')" class="text-rose-500 font-bold text-[9px] uppercase px-2 py-1 bg-slate-50 rounded">Del</button>
                            </div>
                        </div>`;
                }
            });
        });

        // --- GESTÃO DE LOTES ---
        async function salvarLote() {
            const cid = document.getElementById('select-carga-ativa').value;
            const lid = document.getElementById('in-lote').value.trim().toUpperCase();
            const peso = document.getElementById('in-peso').value;
            const ggamil = document.getElementById('in-guia-gamil').value.trim().toUpperCase();
            if(!cid || !lid || !peso) return alert("Preencha os campos!");
            if(todosOsLotes.find(x => x.id === lid)) return alert("Lote Duplicado!");
            const carga = cargasLocais.find(x => x.id === cid);
            const dF = new Date(carga.data_chegada); const ag = new Date();
            dF.setHours(ag.getHours(), ag.getMinutes(), ag.getSeconds());
            await lotesRef.doc(lid).set({ id: lid, peso: parseFloat(peso), carga_id: cid, fornecedor: carga.fornecedor, guia_gamil: ggamil, data_entrada: dF.toISOString(), ts_entrada: dF.getTime(), status: 'estoque', data_picagem: null });
            document.getElementById('in-lote').value = ""; document.getElementById('in-peso').value = "";
        }

        function editarLote(id) {
            if(prompt("Senha:") !== SENHA_MESTRA) return;
            const l = todosOsLotes.find(x => x.id === id);
            ID_LOTE_EDIT = id;
            document.getElementById('select-carga-ativa').value = l.carga_id;
            document.getElementById('in-lote').value = l.id;
            document.getElementById('in-peso').value = l.peso;
            document.getElementById('in-guia-gamil').value = l.guia_gamil;
            document.getElementById('btn-salvar-lote').classList.add('hidden');
            document.getElementById('btn-update-lote').classList.remove('hidden');
            document.getElementById('btn-cancel-lote').classList.remove('hidden');
            document.getElementById('card-lotes').classList.add('edit-mode');
        }

        async function confirmarEdicaoLote() {
            const nId = document.getElementById('in-lote').value.trim().toUpperCase();
            const d = { id: nId, peso: parseFloat(document.getElementById('in-peso').value), guia_gamil: document.getElementById('in-guia-gamil').value.toUpperCase() };
            if(nId !== ID_LOTE_EDIT) await lotesRef.doc(ID_LOTE_EDIT).delete();
            await lotesRef.doc(nId).set(d, { merge: true });
            cancelarEdicaoLote();
        }

        function cancelarEdicaoLote() { ID_LOTE_EDIT = null; document.getElementById('in-lote').value = ""; document.getElementById('in-peso').value = ""; document.getElementById('in-guia-gamil').value = ""; document.getElementById('btn-salvar-lote').classList.remove('hidden'); document.getElementById('btn-update-lote').classList.add('hidden'); document.getElementById('btn-cancel-lote').classList.add('hidden'); document.getElementById('card-lotes').classList.remove('edit-mode'); }

        lotesRef.orderBy('ts_entrada', 'desc').onSnapshot(snap => {
            todosOsLotes = []; let pT = 0; let lT = 0;
            const listE = document.getElementById('lista-lotes-entrada');
            const listP = document.getElementById('lista-picagem');
            if(listE) listE.innerHTML = ""; 
            if(listP) listP.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data(); todosOsLotes.push(d);
                if(d.status === 'estoque') { pT += d.peso; lT++; }
                if(listE) {
                    listE.innerHTML += `
                        <tr>
                            <td class="p-3 font-black">${d.id}</td>
                            <td class="p-3 text-[10px] text-slate-500">${new Date(d.data_entrada).toLocaleString()}</td>
                            <td class="p-3 font-bold text-emerald-600">${d.guia_gamil}</td>
                            <td class="p-3 font-bold text-center text-blue-700">${d.peso}kg</td>
                            <td class="p-3 text-center flex gap-1 justify-center">
                                <button onclick="editarLote('${d.id}')" class="text-blue-500 font-bold text-[9px] uppercase px-1 py-1 bg-slate-50 rounded">Edit</button>
                                <button onclick="apagarLote('${d.id}')" class="text-rose-500 font-bold text-[9px] uppercase px-1 py-1 bg-slate-50 rounded">Del</button>
                            </td>
                        </tr>`;
                }
                if(listP && (d.status === 'estoque' || (d.status === 'consumido' && isToday(d.data_picagem)))) {
                    listP.innerHTML += `
                        <div class="bg-white p-4 rounded-xl border flex justify-between items-center shadow-sm">
                            <div><span class="block font-black text-slate-800 text-sm">${d.id} (${d.peso}kg)</span><span class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">GUIA GAMIL: ${d.guia_gamil}</span></div>
                            <div class="flex items-center gap-3">
                                ${d.status === 'estoque' ? `<button onclick="picarLote('${d.id}')" class="bg-blue-600 text-white text-[10px] px-4 py-2 rounded-lg font-black uppercase shadow-md">Picar</button>` : `<button onclick="reverterPicagem('${d.id}')" class="text-rose-500 text-[9px] font-bold underline transition-all">Reverter</button>`}
                            </div>
                        </div>`;
                }
            });
            document.getElementById('display-ton').innerText = (pT / 1000).toFixed(3) + " t";
            document.getElementById('display-lotes-total').innerText = lT;
        });

        async function apagarCarga(id) { if(prompt("Senha:") === SENHA_MESTRA) await cargasRef.doc(id).delete(); }
        async function apagarLote(id) { if(prompt("Senha:") === SENHA_MESTRA) await lotesRef.doc(id).delete(); }
        async function picarLote(id) { await lotesRef.doc(id).update({ data_picagem: new Date().toISOString(), status: 'consumido' }); }
        async function reverterPicagem(id) { if(prompt("Senha:") === SENHA_MESTRA) await lotesRef.doc(id).update({ data_picagem: null, status: 'estoque' }); }
        function isToday(dateStr) { return dateStr && new Date(dateStr).toDateString() === new Date().toDateString(); }

        function renderizarHistorico() {
            const container = document.getElementById('resumo-diario');
            if(!container) return;
            container.innerHTML = ""; const resumo = {};
            todosOsLotes.forEach(l => {
                const dia = l.data_entrada.split('T')[0];
                const chave = `${dia}|${l.fornecedor}|${l.guia_gamil}`;
                if(!resumo[chave]) resumo[chave] = { qtd: 0, peso: 0, dia, fornecedor: l.fornecedor, guia: l.guia_gamil };
                resumo[chave].qtd++; resumo[chave].peso += l.peso;
            });
            Object.keys(resumo).sort().reverse().forEach(ch => {
                const r = resumo[ch];
                container.innerHTML += `<div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm mb-2 transition-all"><div class="flex justify-between border-b pb-1 mb-2 text-[10px] font-bold text-slate-400"><span>CARGA: ${new Date(r.dia).toLocaleDateString()}</span><span>GAMIL: ${r.guia}</span></div><div class="flex justify-between items-center"><div><span class="block text-xs font-black text-blue-600 uppercase">${r.fornecedor}</span><span class="text-[9px] font-bold text-slate-500">${r.qtd} LOTES</span></div><span class="text-xl font-black text-slate-800">${(r.peso/1000).toFixed(3)}t</span></div></div>`;
            });
        }

        function gerarPDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF('l', 'mm', 'a4');
            const inicio = document.getElementById('filtro-inicio').value;
            const fim = document.getElementById('filtro-fim').value;
            const dados = todosOsLotes.filter(l => { const d = l.data_entrada.split('T')[0]; return (!inicio || d >= inicio) && (!fim || d <= fim); });
            doc.setFontSize(16); doc.text("GAMIL - RELATÓRIO DE ZINCO Master", 14, 20);
            const rows = dados.reverse().map((l, i) => [i + 1, l.id, l.fornecedor, l.guia_gamil, l.peso + "kg", new Date(l.data_entrada).toLocaleString(), l.status.toUpperCase()]);
            doc.autoTable({ head: [['Nº', 'Lote', 'Fornecedor', 'Guia Gamil', 'Peso', 'Entrada', 'Status']], body: rows, startY: 35, headStyles: { fillColor: [15, 23, 42] } });
            doc.save(`relatorio_gamil_v4.8.pdf`);
        }

        setInterval(() => { 
            const clockEl = document.getElementById('clock');
            if(clockEl) clockEl.innerText = new Date().toLocaleString('pt-PT'); 
        }, 1000);

        document.getElementById('pda-scan').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const id = e.target.value.trim().toUpperCase();
                const lote = todosOsLotes.find(l => l.id === id);
                const f = document.getElementById('pda-feedback');
                f.className = "mt-4 p-4 rounded-xl text-center font-bold text-lg block text-white";
                if (lote && lote.status === 'estoque') {
                    picarLote(id); f.innerText = "✅ OK: " + id; f.classList.add('bg-emerald-600');
                } else {
                    f.innerText = lote ? "⚠️ JÁ CONSUMIDO" : "❌ NÃO ENCONTRADO"; f.classList.add('bg-rose-600');
                }
                e.target.value = ""; setTimeout(() => { if(f) f.classList.add('hidden'); }, 3000);
            }
        });
    </script>
</body>
</html>
