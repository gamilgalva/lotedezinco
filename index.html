<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamil | Gestão de Lotes Zinco v2.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 4px solid #3b82f6; color: #1e40af; font-weight: 800; }
        .btn-action { transition: all 0.2s; }
        .btn-action:hover { transform: scale(1.05); }
    </style>
</head>
<body class="min-h-screen pb-10">

    <header class="bg-slate-900 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter text-blue-400">GAMIL <span class="text-white">ZINCO</span></h1>
            <div class="text-[10px] font-bold bg-slate-800 px-3 py-1 rounded-full border border-slate-700 uppercase italic text-blue-300">
                Sistema de Segurança Ativo
            </div>
        </div>
    </header>

    <nav class="bg-white border-b sticky top-[64px] z-40 shadow-sm">
        <div class="container mx-auto flex">
            <button onclick="switchTab('entrada')" id="tab-entrada" class="flex-1 py-4 text-xs font-bold uppercase tracking-widest tab-active">1. Stock</button>
            <button onclick="switchTab('picagem')" id="tab-picagem" class="flex-1 py-4 text-xs font-bold uppercase tracking-widest text-slate-400">2. Picagem</button>
            <button onclick="switchTab('relatorio')" id="tab-relatorio" class="flex-1 py-4 text-xs font-bold uppercase tracking-widest text-slate-400">3. Relatórios</button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6 max-w-4xl">

        <section id="sec-entrada" class="space-y-4">
            <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-200">
                <h3 class="text-sm font-black mb-4 uppercase text-slate-500 tracking-widest">Registo de Entrada</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="in-lote" class="p-3 bg-slate-50 border rounded-xl font-bold uppercase focus:ring-2 ring-blue-500 outline-none" placeholder="ID DO LOTE">
                    <input type="number" id="in-peso" class="p-3 bg-slate-50 border rounded-xl font-bold focus:ring-2 ring-blue-500 outline-none" placeholder="PESO (KG)">
                    <button onclick="salvarEntrada()" class="bg-blue-600 text-white font-bold rounded-xl py-3 btn-action uppercase shadow-lg shadow-blue-200">Adicionar</button>
                </div>
            </div>
            
            <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-200">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 border-b">
                        <tr>
                            <th class="p-4 font-bold uppercase text-[10px] text-slate-400">Lote</th>
                            <th class="p-4 font-bold uppercase text-[10px] text-slate-400">Peso</th>
                            <th class="p-4 font-bold uppercase text-[10px] text-slate-400">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-entrada" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </section>

        <section id="sec-picagem" class="hidden space-y-4">
            <div class="bg-slate-900 p-6 rounded-2xl shadow-xl border-b-4 border-blue-500">
                <input type="text" id="pda-scan" class="w-full p-4 text-3xl text-center font-black bg-white rounded-xl outline-none uppercase placeholder:text-slate-200" placeholder="SCANNER">
                <div id="pda-feedback" class="hidden mt-4 p-4 rounded-xl text-center font-bold text-lg animate-pulse"></div>
            </div>
            
            <div id="lista-picagem" class="space-y-3"></div>
        </section>

        <section id="sec-relatorio" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-200 text-center">
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <input type="date" id="filtro-inicio" class="p-3 border rounded-xl bg-slate-50 font-bold">
                    <input type="date" id="filtro-fim" class="p-3 border rounded-xl bg-slate-50 font-bold">
                </div>
                <button onclick="gerarPDF()" class="w-full bg-slate-800 text-white font-black py-4 rounded-xl uppercase hover:bg-black btn-action">📄 Exportar PDF Mensal</button>
            </div>
        </section>

    </main>

    <script>
        const SENHA_MESTRA = "gamil2026";

        const firebaseConfig = {
            apiKey: "AIzaSyBfd_E9LHXpng0nAtG4-A9GrjGHCo049oM",
            authDomain: "lotezinco.firebaseapp.com",
            projectId: "lotezinco",
            storageBucket: "lotezinco.firebasestorage.app",
            messagingSenderId: "797490873231",
            appId: "1:797490873231:web:a0bd5cef82b5389ad01fa"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const zincoRef = db.collection("movimentacao_zinco");

        let todosOsLotes = [];

        function switchTab(tab) {
            ['entrada', 'picagem', 'relatorio'].forEach(t => {
                document.getElementById(`sec-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).className = 'flex-1 py-4 text-xs font-bold uppercase tracking-widest text-slate-400';
            });
            document.getElementById(`sec-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).className = 'flex-1 py-4 text-xs font-bold uppercase tracking-widest tab-active';
            if(tab === 'picagem') setTimeout(() => document.getElementById('pda-scan').focus(), 200);
        }

        async function salvarEntrada() {
            const lote = document.getElementById('in-lote').value.trim().toUpperCase();
            const peso = document.getElementById('in-peso').value;
            if(!lote || !peso) return alert("Preencha Lote e Peso!");

            await zincoRef.doc(lote).set({
                id: lote, peso: peso, data_entrada: new Date().toISOString(),
                data_picagem: null, status: 'estoque', ts_entrada: Date.now()
            });
            document.getElementById('in-lote').value = ""; document.getElementById('in-peso').value = "";
        }

        async function apagarLote(id) {
            if(confirm(`Deseja apagar o lote ${id} do stock?`)) {
                const pass = prompt("Senha de confirmação:");
                if(pass === SENHA_MESTRA) {
                    await zincoRef.doc(id).delete();
                } else { alert("Senha incorreta!"); }
            }
        }

        async function editarPeso(id, pesoAtual) {
            const novoPeso = prompt(`Novo peso para o lote ${id}:`, pesoAtual);
            if(novoPeso && !isNaN(novoPeso)) {
                await zincoRef.doc(id).update({ peso: novoPeso });
            }
        }

        zincoRef.orderBy('ts_entrada', 'desc').onSnapshot(snap => {
            todosOsLotes = [];
            const listEntrada = document.getElementById('lista-entrada');
            const listPicagem = document.getElementById('lista-picagem');
            listEntrada.innerHTML = ""; listPicagem.innerHTML = "";

            snap.forEach(doc => {
                const d = doc.data();
                todosOsLotes.push(d);

                listEntrada.innerHTML += `
                    <tr>
                        <td class="p-4 font-bold text-slate-800">${d.id}</td>
                        <td class="p-4 font-mono">${d.peso} kg</td>
                        <td class="p-4 flex gap-2">
                            <button onclick="editarPeso('${d.id}', '${d.peso}')" class="text-blue-500 text-[10px] font-bold uppercase">Editar</button>
                            <button onclick="apagarLote('${d.id}')" class="text-red-500 text-[10px] font-bold uppercase">Apagar</button>
                        </td>
                    </tr>
                `;

                if(d.status === 'estoque' || (d.status === 'consumido' && isToday(d.data_picagem))) {
                    listPicagem.innerHTML += `
                        <div class="bg-white p-4 rounded-2xl border flex flex-col md:flex-row justify-between items-center gap-4 shadow-sm">
                            <div>
                                <span class="block font-black text-slate-800 text-lg">${d.id} <small class="text-slate-400 font-normal text-xs">(${d.peso}kg)</small></span>
                                <span class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">Entrada: ${new Date(d.data_entrada).toLocaleString()}</span>
                            </div>
                            <div class="flex items-center gap-3">
                                ${d.status === 'estoque' 
                                    ? `<button onclick="picarLote('${d.id}')" class="bg-blue-600 text-white text-[10px] px-4 py-2 rounded-lg font-black uppercase">Registar Uso</button>`
                                    : `<div class="flex flex-col items-end">
                                        <span class="text-emerald-600 font-black text-[10px] uppercase">● Consumido em ${new Date(d.data_picagem).toLocaleTimeString()}</span>
                                        <button onclick="reverterPicagem('${d.id}')" class="text-rose-500 text-[9px] font-bold underline mt-1">Reverter (Erro)</button>
                                       </div>`
                                }
                            </div>
                        </div>
                    `;
                }
            });
        });

        async function picarLote(id) {
            await zincoRef.doc(id).update({ data_picagem: new Date().toISOString(), status: 'consumido', ts_picagem: Date.now() });
        }

        async function reverterPicagem(id) {
            const pass = prompt("Digite a senha para REVERTER este lote para o stock:");
            if(pass === SENHA_MESTRA) {
                await zincoRef.doc(id).update({ data_picagem: null, status: 'estoque', ts_picagem: null });
                alert("Lote revertido com sucesso!");
            } else { alert("Senha incorreta!"); }
        }

        function isToday(dateStr) {
            if(!dateStr) return false;
            const d = new Date(dateStr); const t = new Date();
            return d.getDate() === t.getDate() && d.getMonth() === t.getMonth() && d.getFullYear() === t.getFullYear();
        }

        function gerarPDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            const inicio = document.getElementById('filtro-inicio').value;
            const fim = document.getElementById('filtro-fim').value;
            const dados = todosOsLotes.filter(l => {
                const d = l.data_entrada.split('T')[0];
                return (!inicio || d >= inicio) && (!fim || d <= fim);
            });
            doc.setFontSize(16); doc.text("RELATÓRIO GAMIL - MOVIMENTAÇÃO DE ZINCO", 14, 20);
            doc.setFontSize(9); doc.text(`Gerado em: ${new Date().toLocaleString()} | Filtro: ${inicio || 'Total'} a ${fim || 'Total'}`, 14, 28);
            const rows = dados.map(l => [l.id, l.peso + " kg", new Date(l.data_entrada).toLocaleDateString(), l.data_picagem ? new Date(l.data_picagem).toLocaleString() : 'STOCK', l.status.toUpperCase()]);
            doc.autoTable({ head: [['ID Lote', 'Peso', 'Entrada', 'Picagem (Uso)', 'Status']], body: rows, startY: 35, theme: 'grid', headStyles: { fillColor: [15, 23, 42] } });
            doc.save(`relatorio_gamil_zinco.pdf`);
        }

        document.getElementById('pda-scan').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const id = e.target.value.trim().toUpperCase();
                const lote = todosOsLotes.find(l => l.id === id);
                if(lote) { picarLote(id); showFeedback("✅ LOTE " + id + " CONSUMIDO", "bg-emerald-600"); }
                else { showFeedback("❌ LOTE NÃO EXISTE NO STOCK", "bg-rose-600"); }
                e.target.value = "";
            }
        });

        function showFeedback(msg, color) {
            const f = document.getElementById('pda-feedback');
            f.innerText = msg; f.className = `mt-4 p-4 rounded-xl text-center font-bold text-lg block text-white ${color}`;
            setTimeout(() => f.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
