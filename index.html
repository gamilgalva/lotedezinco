<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamil | Zinco v4.1 Logistics Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9; 
        }

        .tab-active { 
            border-bottom: 4px solid #3b82f6; 
            color: #1e40af; 
            font-weight: 800; 
        }

        .card-active { 
            border-left: 6px solid #3b82f6; 
            background-color: #f0f9ff; 
        }

        .error-shake { 
            animation: shake 0.4s; 
            border: 2px solid #ef4444 !important; 
        }

        @keyframes shake { 
            0%, 100% { transform: translateX(0); } 
            25% { transform: translateX(-8px); } 
            75% { transform: translateX(8px); } 
        }
    </style>
</head>
<body class="min-h-screen pb-10">

    <header class="bg-slate-900 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black text-blue-400 uppercase tracking-tighter">Gamil <span class="text-white">Logistics</span></h1>
                <p id="clock" class="text-[9px] font-bold opacity-50"></p>
            </div>
            <div class="flex gap-3 text-right">
                <div class="bg-slate-800 px-4 py-1 rounded-xl border border-slate-700">
                    <span class="block text-[8px] uppercase font-black text-slate-400">Total Stock</span>
                    <span id="display-ton" class="text-lg font-black text-emerald-400">0.000 t</span>
                </div>
            </div>
        </div>
    </header>

    <nav class="bg-white border-b sticky top-[68px] z-40 shadow-sm overflow-x-auto whitespace-nowrap">
        <div class="container mx-auto flex">
            <button onclick="switchTab('cargas')" id="tab-cargas" class="px-6 py-4 text-xs font-bold uppercase tracking-widest tab-active">1. Receber Carga</button>
            <button onclick="switchTab('entrada')" id="tab-entrada" class="px-6 py-4 text-xs font-bold uppercase tracking-widest text-slate-400">2. Inserir Lotes</button>
            <button onclick="switchTab('picagem')" id="tab-picagem" class="px-6 py-4 text-xs font-bold uppercase tracking-widest text-slate-400 text-rose-500">3. Picagem</button>
            <button onclick="switchTab('status')" id="tab-status" class="px-6 py-4 text-xs font-bold uppercase tracking-widest text-slate-400 text-blue-600 font-black">4. Histórico</button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6 max-w-4xl">

        <section id="sec-cargas" class="space-y-4">
            <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-200">
                <h3 class="text-xs font-black mb-4 uppercase text-slate-500 tracking-widest italic">Passo 1: Identificar a Carga</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                    <input type="text" id="c-fornecedor" class="p-3 bg-slate-50 border rounded-xl font-bold uppercase outline-none" placeholder="NOME DO FORNECEDOR">
                    <input type="text" id="c-caminhao" class="p-3 bg-slate-50 border rounded-xl font-bold uppercase outline-none" placeholder="PLACA/ID CAMINHÃO">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                    <input type="text" id="c-guia" class="p-3 bg-slate-50 border rounded-xl font-bold uppercase outline-none" placeholder="Nº DA GUIA FORNECEDOR">
                    <input type="number" step="0.001" id="c-toneladas" class="p-3 bg-slate-50 border rounded-xl font-bold uppercase outline-none" placeholder="QTD TOTAL (TONELADAS)">
                </div>
                <button onclick="salvarCarga()" class="w-full bg-blue-600 text-white font-black py-3 rounded-xl uppercase hover:bg-blue-700 transition-all shadow-lg">Abrir Recebimento para esta Carga</button>
            </div>

            <h4 class="text-[10px] font-black uppercase text-slate-400 mt-6 mb-2 tracking-widest">Cargas Ativas para Recebimento</h4>
            <div id="lista-cargas-abertas" class="space-y-3">
                </div>
        </section>

        <section id="sec-entrada" class="hidden space-y-4">
            <div id="card-lotes" class="bg-white p-6 rounded-2xl shadow-md border border-slate-200">
                <h3 class="text-xs font-black mb-4 uppercase text-slate-500 tracking-widest italic">Passo 2: Inserir Lotes no Stock</h3>
                
                <div class="mb-4">
                    <label class="text-[10px] font-bold uppercase text-slate-400 mb-1 block">Escolha a Carga Destino</label>
                    <select id="select-carga-ativa" class="w-full p-3 bg-blue-50 border-2 border-blue-200 rounded-xl font-bold text-blue-900 outline-none">
                        <option value="">-- SELECIONE O FORNECEDOR / GUIA --</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                    <input type="text" id="in-lote" class="p-3 bg-slate-50 border rounded-xl font-bold uppercase outline-none focus:ring-2 ring-blue-500" placeholder="CÓDIGO DO LOTE">
                    <input type="number" id="in-peso" class="p-3 bg-slate-50 border rounded-xl font-bold outline-none focus:ring-2 ring-blue-500" placeholder="PESO DO LOTE (KG)">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                    <input type="text" id="in-guia-gamil" class="p-3 bg-emerald-50 border border-emerald-200 rounded-xl font-bold uppercase outline-none" placeholder="Nº GUIA ENTRADA GAMIL">
                    <button onclick="salvarLote()" class="bg-blue-600 text-white font-bold rounded-xl py-3 uppercase hover:bg-blue-700 transition-all shadow-xl">Adicionar Lote</button>
                </div>
                <div id="entrada-error" class="hidden mt-3 text-rose-600 text-[10px] font-bold uppercase text-center animate-bounce">⚠️ Erro: Verifique os campos ou se o lote já existe!</div>
            </div>

            <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-200">
                <table class="w-full text-left text-xs font-mono italic">
                    <thead class="bg-slate-50 border-b">
                        <tr>
                            <th class="p-3 font-bold text-slate-400 uppercase">Lote</th>
                            <th class="p-3 font-bold text-slate-400 uppercase">Carga / Guia Gamil</th>
                            <th class="p-3 font-bold text-slate-400 uppercase text-center">Peso</th>
                            <th class="p-3 text-center font-bold text-slate-400 uppercase">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-lotes-entrada" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </section>

        <section id="sec-picagem" class="hidden space-y-4">
            <div class="bg-slate-900 p-6 rounded-2xl shadow-xl border-b-4 border-blue-500 text-center">
                <input type="text" id="pda-scan" class="w-full p-4 text-3xl text-center font-black bg-white rounded-xl outline-none uppercase" placeholder="SCANNER PDA">
                <div id="pda-feedback" class="hidden mt-4 p-4 rounded-xl text-center font-bold text-lg"></div>
            </div>
            <div id="lista-picagem" class="space-y-3"></div>
        </section>

        <section id="sec-status" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-200 text-center">
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="date" id="filtro-inicio" class="p-3 border rounded-xl bg-slate-50 font-bold outline-none">
                    <input type="date" id="filtro-fim" class="p-3 border rounded-xl bg-slate-50 font-bold outline-none">
                </div>
                <button onclick="gerarPDF()" class="w-full bg-slate-800 text-white font-black py-4 rounded-xl uppercase shadow-lg hover:bg-black transition-all">📄 Gerar Relatório PDF Numerado</button>
            </div>
            
            <div id="resumo-diario" class="space-y-4"></div>
        </section>

    </main>

    <script>
        const SENHA_MESTRA = "gamil2026";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBfd_E9LHXpng0nAtG4-A9GrjGHCo049oM",
            authDomain: "lotezinco.firebaseapp.com",
            projectId: "lotezinco",
            storageBucket: "lotezinco.firebasestorage.app",
            messagingSenderId: "797490873231",
            appId: "1:797490873231:web:a0bd5cef82b5389ad01fa"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const cargasRef = db.collection("cargas_zinco");
        const lotesRef = db.collection("movimentacao_zinco");

        let cargasAtivas = [];
        let todosOsLotes = [];

        function switchTab(tab) {
            const abas = ['cargas', 'entrada', 'picagem', 'status'];
            abas.forEach(t => {
                document.getElementById(`sec-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).className = 'px-6 py-4 text-xs font-bold uppercase tracking-widest text-slate-400';
            });
            document.getElementById(`sec-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).className = 'px-6 py-4 text-xs font-bold uppercase tracking-widest tab-active';
            
            if(tab === 'picagem') setTimeout(() => document.getElementById('pda-scan').focus(), 200);
            if(tab === 'status') renderizarHistorico();
        }

        async function salvarCarga() {
            const fornecedor = document.getElementById('c-fornecedor').value.trim().toUpperCase();
            const caminhao = document.getElementById('c-caminhao').value.trim().toUpperCase();
            const guia = document.getElementById('c-guia').value.trim().toUpperCase();
            const toneladas = document.getElementById('c-toneladas').value || 0;

            if(!fornecedor || !caminhao || !guia) {
                alert("Por favor, preencha todos os dados da carga!");
                return;
            }

            const cargaId = `CARGA-${Date.now()}`;
            
            await cargasRef.doc(cargaId).set({
                id: cargaId,
                fornecedor: fornecedor,
                caminhao: caminhao,
                guia: guia,
                toneladas_declaradas: parseFloat(toneladas),
                data_chegada: new Date().toISOString(),
                timestamp: Date.now(),
                status: 'aberta'
            });

            document.getElementById('c-fornecedor').value = "";
            document.getElementById('c-caminhao').value = "";
            document.getElementById('c-guia').value = "";
            document.getElementById('c-toneladas').value = "";
        }

        cargasRef.orderBy('timestamp', 'desc').onSnapshot(snap => {
            cargasAtivas = [];
            const container = document.getElementById('lista-cargas-abertas');
            const select = document.getElementById('select-carga-ativa');
            
            container.innerHTML = "";
            select.innerHTML = '<option value="">-- SELECIONE O FORNECEDOR / GUIA --</option>';

            snap.forEach(doc => {
                const c = doc.data();
                if(c.status === 'aberta') {
                    cargasAtivas.push(c);
                    select.innerHTML += `<option value="${c.id}">${c.fornecedor} | GUIA: ${c.guia} (${c.caminhao})</option>`;
                    
                    container.innerHTML += `
                        <div class="p-4 bg-white rounded-xl shadow-sm border border-slate-200 card-active flex justify-between items-center">
                            <div>
                                <span class="block text-blue-600 font-black text-xs uppercase">${c.fornecedor}</span>
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Caminhão: ${c.caminhao} | Guia: ${c.guia}</span>
                                <span class="block text-[10px] font-black text-emerald-600 uppercase italic">Carga Prevista: ${c.toneladas_declaradas.toFixed(3)} t</span>
                            </div>
                            <button onclick="apagarCarga('${c.id}')" class="text-rose-500 font-bold text-[9px] uppercase hover:underline">Fechar Carga</button>
                        </div>`;
                }
            });
        });

        async function salvarLote() {
            const cargaId = document.getElementById('select-carga-ativa').value;
            const loteId = document.getElementById('in-lote').value.trim().toUpperCase();
            const peso = document.getElementById('in-peso').value;
            const guiaGamil = document.getElementById('in-guia-gamil').value.trim().toUpperCase();

            if(!cargaId || !loteId || !peso || !guiaGamil) {
                alert("Erro: Selecione a Carga e preencha Lote, Peso e Guia Gamil!");
                return;
            }

            if(todosOsLotes.find(l => l.id === loteId)) {
                alert("Atenção: Este Lote já foi registado anteriormente!");
                return;
            }

            const carga = cargasAtivas.find(c => c.id === cargaId);

            await lotesRef.doc(loteId).set({
                id: loteId,
                peso: parseFloat(peso),
                carga_id: cargaId,
                fornecedor: carga.fornecedor,
                caminhao: carga.caminhao,
                guia_fornecedor: carga.guia,
                guia_gamil: guiaGamil,
                data_entrada: new Date().toISOString(),
                ts_entrada: Date.now(),
                status: 'estoque',
                data_picagem: null
            });

            document.getElementById('in-lote').value = "";
            document.getElementById('in-peso').value = "";
        }

        lotesRef.orderBy('ts_entrada', 'desc').onSnapshot(snap => {
            todosOsLotes = [];
            let pesoTotalEstoque = 0;
            const listaEntrada = document.getElementById('lista-lotes-entrada');
            const listaPicagem = document.getElementById('lista-picagem');
            
            listaEntrada.innerHTML = "";
            listaPicagem.innerHTML = "";

            snap.forEach(doc => {
                const d = doc.data();
                todosOsLotes.push(d);
                if(d.status === 'estoque') {
                    pesoTotalEstoque += d.peso;
                }

                listaEntrada.innerHTML += `
                    <tr>
                        <td class="p-3 font-black text-slate-800">${d.id}</td>
                        <td class="p-3">
                            <span class="text-[9px] font-black uppercase text-blue-600 block">${d.fornecedor}</span>
                            <span class="text-[8px] text-emerald-600 uppercase font-bold">GAMIL: ${d.guia_gamil}</span>
                        </td>
                        <td class="p-3 font-bold text-center text-blue-700">${d.peso}kg</td>
                        <td class="p-3 text-center">
                            <button onclick="apagarLote('${d.id}')" class="text-rose-500 text-[9px] font-bold uppercase hover:scale-110 transition-all">Del</button>
                        </td>
                    </tr>`;

                if(d.status === 'estoque' || (d.status === 'consumido' && isToday(d.data_picagem))) {
                    listaPicagem.innerHTML += `
                        <div class="bg-white p-4 rounded-xl border flex justify-between items-center shadow-sm">
                            <div>
                                <span class="block font-black text-slate-800 text-sm">${d.id} (${d.peso}kg)</span>
                                <span class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">${d.fornecedor} | GAMIL: ${d.guia_gamil}</span>
                            </div>
                            <div class="flex items-center gap-3">
                                ${d.status === 'estoque' 
                                    ? `<button onclick="picarLote('${d.id}')" class="bg-blue-600 text-white text-[10px] px-4 py-2 rounded-lg font-black uppercase shadow-md">Picar</button>`
                                    : `<div class="text-right">
                                        <span class="text-emerald-600 font-black text-[10px] uppercase italic">Registado</span>
                                        <button onclick="reverterPicagem('${d.id}')" class="block text-rose-500 text-[9px] underline font-bold mt-1">Reverter</button>
                                       </div>`
                                }
                            </div>
                        </div>`;
                }
            });
            document.getElementById('display-ton').innerText = (pesoTotalEstoque / 1000).toFixed(3) + " t";
        });

        async function apagarCarga(id) {
            const senha = prompt("Digite a senha para FECHAR/APAGAR esta carga:");
            if(senha === SENHA_MESTRA) {
                await cargasRef.doc(id).delete();
            } else {
                alert("Senha incorreta!");
            }
        }

        async function apagarLote(id) {
            const senha = prompt("Senha de segurança para APAGAR este Lote:");
            if(senha === SENHA_MESTRA) {
                await lotesRef.doc(id).delete();
            } else {
                alert("Senha incorreta!");
            }
        }

        async function reverterPicagem(id) {
            const senha = prompt("Senha para REVERTER este lote para o stock:");
            if(senha === SENHA_MESTRA) {
                await lotesRef.doc(id).update({ data_picagem: null, status: 'estoque' });
            } else {
                alert("Senha incorreta!");
            }
        }

        async function picarLote(id) {
            await lotesRef.doc(id).update({
                data_picagem: new Date().toISOString(),
                status: 'consumido'
            });
        }

        function isToday(dateStr) {
            if(!dateStr) return false;
            return new Date(dateStr).toDateString() === new Date().toDateString();
        }

        function renderizarHistorico() {
            const container = document.getElementById('resumo-diario');
            container.innerHTML = "";
            const resumo = {};
            
            todosOsLotes.forEach(l => {
                const dia = l.data_entrada.split('T')[0];
                const chave = `${dia}|${l.fornecedor}|${l.guia_gamil}`;
                if(!resumo[chave]) {
                    resumo[chave] = { qtd: 0, peso: 0, dia, fornecedor: l.fornecedor, guia: l.guia_gamil };
                }
                resumo[chave].qtd++;
                resumo[chave].peso += l.peso;
            });

            Object.keys(resumo).sort().reverse().forEach(chave => {
                const r = resumo[chave];
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                        <div class="flex justify-between border-b pb-2 mb-2 text-[10px] font-bold text-slate-400">
                            <span>${new Date(r.dia).toLocaleDateString()}</span><span>GUIA GAMIL: ${r.guia}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <div>
                                <span class="block text-xs font-black text-blue-600 uppercase">${r.fornecedor}</span>
                                <span class="text-[9px] font-bold text-slate-500">${r.qtd} LOTES NESSA CARGA</span>
                            </div>
                            <span class="text-xl font-black text-slate-800">${(r.peso/1000).toFixed(3)}t</span>
                        </div>
                    </div>`;
            });
        }

        function gerarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            const inicio = document.getElementById('filtro-inicio').value;
            const fim = document.getElementById('filtro-fim').value;
            
            const dados = todosOsLotes.filter(l => {
                const d = l.data_entrada.split('T')[0];
                return (!inicio || d >= inicio) && (!fim || d <= fim);
            });

            doc.setFontSize(16);
            doc.text("GAMIL - RELATÓRIO DE ZINCO v4.1 (LOGÍSTICA COMPLETA)", 14, 20);
            
            const rows = dados.reverse().map((l, i) => [
                i + 1, 
                l.id, 
                l.fornecedor, 
                l.guia_fornecedor, 
                l.guia_gamil, 
                l.peso + "kg", 
                new Date(l.data_entrada).toLocaleString(), 
                l.status.toUpperCase()
            ]);

            doc.autoTable({ 
                head: [['Nº', 'ID Lote', 'Fornecedor', 'Guia Forn.', 'Guia Gamil', 'Peso', 'Data Entrada', 'Status']], 
                body: rows, 
                startY: 35, 
                headStyles: { fillColor: [15, 23, 42] } 
            });
            doc.save(`relatorio_gamil_zinco_v4.1_full.pdf`);
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleString('pt-PT');
        }, 1000);

        document.getElementById('pda-scan').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const id = e.target.value.trim().toUpperCase();
                const lote = todosOsLotes.find(l => l.id === id);
                const f = document.getElementById('pda-feedback');
                
                f.className = "mt-4 p-4 rounded-xl text-center font-bold text-lg block text-white";
                
                if (lote && lote.status === 'estoque') {
                    picarLote(id);
                    f.innerText = "✅ REGISTADO: " + id;
                    f.classList.add('bg-emerald-600');
                } else {
                    f.innerText = lote ? "⚠️ JÁ CONSUMIDO" : "❌ NÃO ENCONTRADO";
                    f.classList.add('bg-rose-600');
                }
                
                e.target.value = "";
                setTimeout(() => f.classList.add('hidden'), 3000);
            }
        });
    </script>
</body>
</html>
