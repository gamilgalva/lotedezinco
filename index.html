<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamil | Gestão de Lotes de Zinco</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .row-validated { border-left: 5px solid #10b981; background-color: #f0fdf4; }
        .row-new { border-left: 5px solid #3b82f6; background-color: #eff6ff; }
        @media print {
            header, nav, .no-print, button, #pda-input { display: none !important; }
            body { background-color: white !important; padding: 0 !important; }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-10 text-slate-900">

    <header class="bg-slate-900 text-white shadow-xl sticky top-0 z-50 no-print">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-extrabold tracking-tighter text-slate-400">GAMIL <span class="text-white">ZINCO</span></h1>
                <p class="text-[10px] uppercase tracking-widest opacity-60 font-bold italic">Controle de Recebimento e Validação</p>
            </div>
            <div class="flex items-center gap-2 bg-slate-800 px-3 py-1 rounded-full border border-slate-700">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
                <span class="text-[10px] font-bold text-slate-300 uppercase italic">Registro de Lotes</span>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6 max-w-4xl">
        
        <div class="bg-white rounded-2xl shadow-xl border-4 border-slate-800 p-4 mb-6 no-print">
            <label class="block text-center text-[10px] font-bold text-slate-400 uppercase mb-2">Escanear ID do Lote</label>
            <input type="text" id="pda-input" class="w-full p-4 text-3xl text-center font-black bg-slate-50 rounded-xl outline-none border-2 border-transparent focus:border-blue-500" placeholder="000000" autofocus>
            <div id="pda-feedback" class="hidden mt-4 p-4 rounded-xl text-center font-bold text-lg"></div>
        </div>

        <div class="bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden">
            <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                <h2 class="text-sm font-bold uppercase tracking-tight text-slate-600">Lotes no Sistema</h2>
                <div class="flex gap-2 no-print">
                    <button onclick="window.print()" class="bg-slate-200 text-slate-700 text-[10px] px-4 py-2 rounded-lg font-bold uppercase hover:bg-slate-300 transition-all">🖨️ Relatório</button>
                </div>
            </div>
            
            <div id="lotes-list" class="divide-y divide-slate-100 max-h-[600px] overflow-y-auto font-mono text-sm">
                </div>
        </div>
    </main>

    <script>
        // --- CONFIGURAÇÃO FIREBASE (SUBSTITUA PELOS DADOS DO NOVO BANCO) ---
        const firebaseConfig = {
            apiKey: "COLAR_AQUI",
            authDomain: "COLAR_AQUI",
            projectId: "COLAR_AQUI",
            storageBucket: "COLAR_AQUI",
            messagingSenderId: "COLAR_AQUI",
            appId: "COLAR_AQUI"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        // Alterado para uma coleção específica de Zinco
        const zincoRef = db.collection("recebimento_zinco");

        let lotesLocais = {};

        // Escuta em tempo real
        zincoRef.orderBy('data_entrada', 'desc').onSnapshot((snap) => {
            lotesLocais = {};
            const container = document.getElementById('lotes-list');
            container.innerHTML = "";

            if (snap.empty) {
                container.innerHTML = `<p class="p-10 text-center text-slate-400 italic">Nenhum lote registrado.</p>`;
                return;
            }

            snap.forEach(doc => {
                const d = doc.data();
                lotesLocais[doc.id] = d;
                
                const div = document.createElement('div');
                // Se tiver data de validação, fica verde. Se não, fica azul (apenas entrada).
                div.className = `p-4 flex flex-col md:flex-row md:items-center justify-between gap-2 ${d.data_validacao ? 'row-validated' : 'row-new'}`;
                
                div.innerHTML = `
                    <div class="flex flex-col">
                        <span class="font-bold text-lg text-slate-800">${doc.id}</span>
                        <span class="text-[10px] text-slate-500 uppercase">Entrada: ${d.data_entrada}</span>
                    </div>
                    <div class="flex items-center gap-3">
                        ${d.data_validacao 
                            ? `<span class="bg-emerald-100 text-emerald-700 text-[10px] px-3 py-1 rounded-full font-bold border border-emerald-200">VALIDADO EM: ${d.data_validacao}</span>` 
                            : `<span class="bg-blue-100 text-blue-700 text-[10px] px-3 py-1 rounded-full font-bold border border-blue-200 animate-pulse">AGUARDANDO VALIDAÇÃO</span>`
                        }
                    </div>
                `;
                container.appendChild(div);
            });
        });

        async function processarLote(code) {
            const f = document.getElementById('pda-feedback');
            f.className = "mt-4 p-4 rounded-xl text-center font-bold text-lg block";
            
            const agora = new Date().toLocaleString('pt-PT');
            const loteExistente = lotesLocais[code];

            try {
                if (!loteExistente) {
                    // REGISTRO DE ENTRADA (NOVO LOTE)
                    await zincoRef.doc(code).set({
                        data_entrada: agora,
                        data_validacao: null,
                        timestamp_entrada: Date.now()
                    });
                    f.innerText = "📥 LOTE REGISTRADO: " + code;
                    f.classList.add('bg-blue-600', 'text-white');
                    beep(600, 0.1);
                } else if (loteExistente && !loteExistente.data_validacao) {
                    // VALIDAÇÃO DE LOTE EXISTENTE
                    await zincoRef.doc(code).update({
                        data_validacao: agora,
                        timestamp_validacao: Date.now()
                    });
                    f.innerText = "✅ LOTE VALIDADO: " + code;
                    f.classList.add('bg-emerald-600', 'text-white');
                    beep(800, 0.1);
                } else {
                    // JÁ FOI VALIDADO ANTES
                    f.innerText = "⚠️ LOTE JÁ TINHA SIDO VALIDADO: " + code;
                    f.classList.add('bg-amber-500', 'text-white');
                    beep(300, 0.2);
                }
            } catch (error) {
                console.error(error);
                f.innerText = "❌ ERRO AO SALVAR";
                f.classList.add('bg-red-600', 'text-white');
            }

            setTimeout(() => { f.classList.add('hidden'); }, 3000);
        }

        function beep(f, d) { try { const c = new (window.AudioContext || window.webkitAudioContext)(); const o = c.createOscillator(); const g = c.createGain(); o.connect(g); g.connect(c.destination); o.frequency.value = f; o.start(); setTimeout(() => o.stop(), d * 1000); } catch(e) {} }

        document.getElementById('pda-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { 
                const val = e.target.value.trim().toUpperCase();
                if(val) processarLote(val); 
                e.target.value = ""; 
            }
        });
    </script>
</body>
</html>
